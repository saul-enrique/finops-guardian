name: Infracost

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Infracost cost estimate
    runs-on: ubuntu-latest
    steps:
      # Esta acción necesita la historia para comparar, pero no mucha.
      # `fetch-depth: 2` es la recomendación oficial.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Esta es la única acción de Infracost que necesitamos.
      # Ella se encarga de TODO: instalar, comparar, y comentar.
      - uses: infracost/infracost-github-action@v2
        with:
          # No necesitamos especificar la base. La acción lo detecta automáticamente.
          path: .
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          behavior: update
