name: Infracost

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Infracost cost estimate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: infracost/infracost-github-action@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - uses: actions/checkout@v4
        with:
          path: pr

      - uses: infracost/infracost-github-action@v2
        with:
          path: pr/
          behavior: update
          api-key: ${{ secrets.INFRACOST_API_KEY }}
