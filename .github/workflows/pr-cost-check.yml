# El nombre que aparecerá en la pestaña "Actions" de GitHub
name: FinOps Guardian - Cost Check

# El disparador (trigger): ¿Cuándo debe ejecutarse este workflow?
on:
  # Lo ejecutamos en cada Pull Request que apunte a la rama 'main'
  pull_request:
    branches: [ main ]

# Los trabajos (jobs) que se van a realizar
jobs:
  # Definimos un único trabajo llamado 'cost-analysis'
  cost-analysis:
    # Le decimos a GitHub que use un ordenador virtual con la última versión de Ubuntu
    runs-on: ubuntu-latest

    # Los pasos (steps) que ejecutará el trabajo, en orden
    steps:
      # Paso 1: Descargar el código de nuestro repositorio en el ordenador virtual
      # Esto es una acción pre-hecha por GitHub, es el primer paso en casi todos los workflows.
      - name: Check out repository code
        uses: actions/checkout@v4

      # Paso 2: Un simple paso para confirmar que el workflow se está ejecutando
      - name: Say hello
        run: echo "👋 Hello! The cost analysis workflow has started!"
