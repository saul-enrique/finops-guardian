name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

# ¡NUEVO! Necesitamos permisos para escribir comentarios en el PR.
permissions:
  pull-requests: write

jobs:
  cost-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run FinOps Guardian Analysis
        id: guardian_analysis # Le dimos un ID a este paso
        run: go run main.go main

      # --- ¡EL GRAN FINAL ESTÁ AQUÍ! ---
      # Paso 6: Publicar el reporte como un comentario en el PR.
      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          # Le damos acceso al token de GitHub para que pueda usar la API
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.guardian_analysis.outputs.report }}`
            })
