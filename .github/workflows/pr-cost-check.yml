name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Run Infracost diff
    runs-on: ubuntu-latest
    steps:
      - name: Check out base code
        uses: actions/checkout@v4
        with:
          # Esto es importante, la acción de Infracost necesita la referencia base.
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check out PR code
        uses: actions/checkout@v4
        with:
          # Y el código del PR se coloca en una carpeta separada para comparar.
          path: 'pr'

      - name: Run Infracost diff
        uses: infracost/actions/diff@v2
        with:
          # Compara el directorio base con el directorio 'pr'.
          path: ./pr/
          compare-to: ./
          # El comportamiento 'update' buscará y actualizará su propio comentario.
          behavior: update
          # Le pasamos la API key de forma segura.
          api-key: ${{ secrets.INFRACOST_API_KEY }}
