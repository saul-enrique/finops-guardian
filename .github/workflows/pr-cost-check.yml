name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

jobs:
  cost-analysis:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Descargar el código - ¡CON LA HISTORIA COMPLETA!
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 le dice a la acción que descargue todos los commits
          # Esto es CRUCIAL para que nuestro comando 'git checkout main' funcione.
          fetch-depth: 0

      # Paso 2: Instalar Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Paso 3: Instalar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Paso 4: Instalar Infracost
      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # ----- ¡EL GRAN CAMBIO ESTÁ AQUÍ! -----
      # Paso 5: Ejecutar el análisis de costos con nuestra CLI
      - name: Run FinOps Guardian Analysis
        id: guardian_analysis # Le damos un ID a este paso para poder referenciar su salida más tarde
        run: go run main.go main
