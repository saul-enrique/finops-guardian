name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  cost-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run FinOps Guardian Analysis
        id: guardian_analysis
        # Ejecutamos la CLI. Su salida (el JSON) se capturará automáticamente.
        run: go run main.go main ${{ github.head_ref }}

      - name: Post Cost Report to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Obtenemos el JSON puro del paso anterior
            const output = ${{ toJSON(steps.guardian_analysis.outputs.stdout) }};
            const data = JSON.parse(output);

            // Construimos el cuerpo del comentario usando Javascript
            const body = `
            ### 🛡️ Reporte de FinOps Guardian (Bot Final) 🛡️

            | Descripción | Costo Mensual |
            | :--- | :--- |
            | Costo Anterior | **$${data.pastTotalMonthlyCost || 0}** |
            | Nuevo Costo | **$${data.totalMonthlyCost || 0}** |
            | **Impacto del Cambio** | **$${data.diffTotalMonthlyCost || 0}** |
            `;

            // Publicamos el comentario
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
