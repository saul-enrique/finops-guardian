name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: Run Infracost diff
    runs-on: ubuntu-latest
    steps:
      - name: Check out base code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check out PR code
        uses: actions/checkout@v4
        with:
          path: 'pr'

      # --- ¡LA CORRECCIÓN ESTÁ AQUÍ! ---
      # La ruta correcta es 'infracost/infracost-action/comment@v2'
      - name: Run Infracost and Post Comment
        uses: infracost/infracost-action/comment@v2
        with:
          path: ./pr/
          compare-to: ./
          behavior: update
          api-key: ${{ secrets.INFRACOST_API_KEY }}
