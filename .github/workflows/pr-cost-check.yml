name: FinOps Guardian - Cost Check

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  cost-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run FinOps Guardian Analysis
        id: guardian_analysis
        # Simplemente ejecutamos el programa. Ya no necesita argumentos.
        run: go run main.go

      - name: Post Cost Report to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = ${{ toJSON(steps.guardian_analysis.outputs.stdout) }};
            const data = JSON.parse(output);
            const body = `
            ### 🛡️ Reporte de FinOps Guardian 🛡️

            ¡Análisis de costos completado por tu bot personal!

            | Descripción | Costo Mensual Estimado |
            | :--- | :--- |
            | Costo Anterior | **$${data.pastTotalMonthlyCost || '0.00'}** |
            | Nuevo Costo | **$${data.totalMonthlyCost || '0.00'}** |
            | **Impacto del Cambio** | **$${data.diffTotalMonthlyCost || '0.00'}** |
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
